<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <title>Frontend Mentor | Blog preview card</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: hsl(47, 88%, 63%);
      font-family: Figtree;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 100vh;
    }
    #card {
      width: 20rem;
      background-color: hsl(0, 0%, 100%);
      text-align: left;
      padding: 1.5rem;
      border-radius: 1rem;
      border: 2px solid black;
      box-shadow: 0.5rem 0.5rem;
    }
    #blog-img {
      width: 100%;
      border-radius: 1rem;
    }
    #profile {
      display: flex;
      gap: 0.75rem;
      font-weight: 900;
      font-size: 0.875rem;
      align-items: center;
    }
    #avator {
      width: 2rem;
    }
    #para {
      color: hsl(0, 0%, 42%);
      font-size: 1rem;
      font-weight: 500;
    }
    .text-grey {
      color: hsl(0, 0%, 7%);
      font-weight: bolder;
    }
    .tag {
      background-color: hsl(47, 88%, 63%);
      padding: 0.5rem 0.75rem;
      border: none;
      border-radius: 0.25rem;
      margin-top: 1rem;
      font-size: 0.75rem;
      font-weight: 1000;
    }
    h1 {
      font-weight: 1000;
      font-size: 1.5rem;
    }
    footer {
      margin-top: 2rem;
    }
    .date {
      font-weight: 600;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

  <div id="card">
    <img src="/blog-preview-card-main/assets/images/illustration-article.svg" alt="illustration" id="blog-img">
    <button class="text-grey tag">Learning</button>
    <p class="text-grey date">Published 21 Dec 2023</p>
    <h1 class="text-grey">HTML & CSS foundations</h1>
    <p id="para">These languages are the backbone of every website, defining structure, content, and presentation.</p>
   <div id="profile">
      <img src="/blog-preview-card-main/assets/images/image-avatar.webp" alt="avator icon" id="avator">
      <p class="text-grey">Greg Hooper</p>
   </div>
  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Urwah Rafiq</a>.
  </footer>
</body>
</html>
