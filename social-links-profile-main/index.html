<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Social links profile</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: 100vh;
      background-color: hsl(0, 0%, 8%);
      color: hsl(0, 0%, 100%);
    }
    div {
      background-color: hsl(0, 0%, 12%);
      padding: 1.5rem;
      border-radius: 0.5rem;
      width: 13rem;
      height: 23rem;
      letter-spacing: 3%;
    }
    li {
      list-style-type: none; 
      background-color: hsl(0, 0%, 20%);
      margin-top: 0.8rem; 
      padding: 0.6rem;
      border-radius: 0.25rem;
      margin-left: -2.5rem;
      font-size: 0.5rem;
    }
    li:hover {
      background-color: hsl(75, 94%, 57%);
      color: hsl(0, 0%, 12%);
      transform: translateX(0.5rem);
    }
    a {
      text-decoration: none;  
      font-size: 0.6rem;
      font-weight: 500;
      color: inherit;
    }
    h1 {
      font-size: 1rem;
      font-weight: 600;
    }
    h4 {
      color: hsl(75, 94%, 57%);
      font-size: 0.58rem;
      font-weight: 600;
      margin-top: -0.2rem;
    }
    footer {
      margin-top: 2rem;
    }
    img {
      border-radius: 100%;
      width: 4rem;
    }
    p {
      font-size: 0.58rem;
      font-weight: 200;
      padding-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div>
    <img src="./assets/images/avatar-jessica.jpeg" alt="avator image">
    <h1>Jessica Randall</h1>
    <h4>London, United Kingdom</h2>
    <p>"Front-end developer and avid reader."</p>
    <ul>
      <li><a href="#">GitHub</a></li>
      <li><a href="#">Frontend Mentor</a></li>
      <li><a href="#">LinkedIn</a></li>
      <li><a href="#">Twitter</a></li>
      <li><a href="#">Instagram</a></li>
    </ul>
  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Urwah Rafiq</a>.
  </footer>
</body>
</html>
